  internal_handler_role.PermissionResponse:
    properties:
      action:
        type: string
      description:
        type: string
      id:
        type: integer
      key:
        type: string
      resource:
        type: string
    type: object
  internal_handler_role.RoleResponse:
    properties:
      createdAt:
        type: string
      description:
        type: string
      displayName:
        type: string
      id:
        type: integer
      isSystem:
        type: boolean
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/internal_handler_role.PermissionResponse'
        type: array
      updatedAt:
        type: string
      userCount:
        type: integer
    type: object
  internal_handler_role.UnassignRoleRequest:
    properties:
      roleId:
        type: integer
      userId:
        type: integer
    required:
    - roleId
    - userId
    type: object
  internal_handler_role.UpdateRequest:
    properties:
      description:
        type: string
      displayName:
        type: string
      permissionIds:
        items:
          type: integer
        type: array
    type: object
  internal_handler_user.CreateRequest:
    properties:
      password:
        minLength: 6
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      username:
        type: string
    required:
    - password
    - role
    - username
    type: object
  internal_handler_user.UpdateRequest:
    properties:
      password:
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      username:
        type: string
    type: object
  internal_handler_user.UserResponse:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      isSuperAdmin:
        type: boolean
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      updatedAt:
        type: string
      username:
        type: string
    type: object
  internal_modules_comment.createInput:
    properties:
      authorEmail:
        type: string
      authorName:
        type: string
      authorUrl:
        type: string
      captchaToken:
        type: string
      content:
        type: string
