basePath: /
definitions:
  blotting-consultancy_internal_model.JSONMap:
    additionalProperties: true
    type: object
  internal_handler_article.createUpdateInput:
    properties:
      allowComments:
        type: boolean
      author:
        type: string
      autoSummary:
        type: boolean
      categoryId:
        type: integer
      categoryIds:
        items:
          type: integer
        type: array
      coverImage:
        type: string
      enBody:
        type: string
      enMetaDescription:
        type: string
      enSeoTitle:
        type: string
      enTitle:
        type: string
      metadata:
        $ref: '#/definitions/blotting-consultancy_internal_model.JSONMap'
      ogImage:
        type: string
      pinned:
        type: boolean
      scheduledAt:
        type: string
      slug:
        type: string
      status:
        type: string
      tagIds:
        items:
          type: integer
        type: array
      visibility:
        type: string
      zhBody:
        type: string
      zhMetaDescription:
        type: string
      zhSeoTitle:
        type: string
      zhTitle:
        type: string
    type: object
  internal_handler_auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  internal_handler_auth.LoginResponse:
    properties:
      accessToken:
        type: string
      expiresIn:
        type: integer
      refreshToken:
        type: string
      role:
        type: string
    type: object
  internal_handler_auth.LogoutRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  internal_handler_auth.LogoutResponse:
    properties:
      ok:
        type: boolean
    type: object
  internal_handler_auth.MeResponse:
    properties:
      id:
        type: integer
      isSuperAdmin:
        type: boolean
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      username:
        type: string
    type: object
  internal_handler_auth.RefreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  internal_handler_auth.RefreshResponse:
    properties:
      accessToken:
        type: string
      expiresIn:
        type: integer
    type: object
  internal_handler_role.AssignRoleRequest:
    properties:
      roleId:
        type: integer
      siteId:
        type: integer
      userId:
        type: integer
