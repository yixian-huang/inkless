        type: string
      parentId:
        type: integer
    required:
    - authorName
    - content
    - contentId
    - contentType
    type: object
host: localhost:8088
info:
  contact: {}
  description: Bilingual CMS backend API for Impress. Supports content management,
    articles, pages, themes, media, and more.
  title: Impress CMS API
  version: "1.0"
paths:
  /admin/analytics/summary:
    get:
      description: Returns page view statistics including today, last 7 days, last
        30 days, and unique visitors
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              pages:
                items:
                  type: object
                type: array
              totals:
                type: object
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get analytics summary
      tags:
      - Analytics (Admin)
  /admin/articles:
    get:
      description: Returns paginated articles including drafts for admin management
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Status filter (draft/published/scheduled)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
              total:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all articles (admin)
      tags:
      - Articles (Admin)
    post:
      consumes:
      - application/json
      description: Create a new article (draft by default)
      parameters:
      - description: Article data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_article.createUpdateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create article
      tags:
      - Articles (Admin)
  /admin/articles/{id}:
    delete:
      description: Permanently delete an article by ID
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete article
      tags:
      - Articles (Admin)
    get:
      description: Returns a single article by its database ID
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get article by ID (admin)
      tags:
      - Articles (Admin)
    put:
      consumes:
      - application/json
      description: Update an existing article by ID
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated article data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_article.createUpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update article
      tags:
      - Articles (Admin)
  /admin/articles/{id}/export:
    get:
      description: Returns the article as a Markdown file with YAML front matter
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - text/markdown
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Export article as Markdown
      tags:
      - Articles (Admin)
  /admin/articles/import:
    post:
      consumes:
      - multipart/form-data
      description: Accepts multipart form with .md files and creates draft articles
      parameters:
      - description: Markdown files to import
        in: formData
        name: files
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              count:
                type: integer
              imported:
                items:
                  type: string
                type: array
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Import articles from Markdown
      tags:
      - Articles (Admin)
  /admin/audit-logs:
    get:
      description: Returns paginated audit events with optional filters
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Action filter
        in: query
        name: action
        type: string
      - description: Actor filter
        in: query
        name: actor
        type: string
      - description: From date (RFC3339)
        in: query
        name: from
        type: string
      - description: To date (RFC3339)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
              page:
                type: integer
              pageSize:
                type: integer
              total:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: List audit logs
      tags:
      - Audit Logs
  /admin/backups:
    get:
      description: Returns all backup records
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
            type: object
      security:
      - BearerAuth: []
      summary: List backups
      tags:
      - Backup
  /admin/backups/export:
    post:
      description: Generate a full site export as a ZIP archive
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Export site
      tags:
      - Backup
  /admin/backups/export/{filename}:
    get:
      description: Download a site export ZIP file
      parameters:
      - description: Export filename
        in: path
        name: filename
        required: true
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Download export
      tags:
      - Backup
  /admin/backups/import:
    post:
      consumes:
      - multipart/form-data
      description: Upload a ZIP archive and restore the full site
      parameters:
      - description: Import ZIP file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Import site
      tags:
      - Backup
  /admin/backups/import/validate:
    post:
      consumes:
      - multipart/form-data
      description: Upload a ZIP and validate its structure without importing
      parameters:
      - description: Import ZIP file to validate
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Validate import
      tags:
      - Backup
  /admin/backups/trigger:
    post:
      description: Manually trigger a database backup
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Trigger backup
      tags:
      - Backup
  /admin/categories:
    get:
      description: Returns all categories for admin management
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
            type: object
      security:
      - BearerAuth: []
      summary: List all categories
      tags:
      - Categories (Admin)
    post:
      consumes:
      - application/json
      description: Create a new category
      parameters:
      - description: Category data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create category
      tags:
      - Categories
  /admin/categories/{id}:
    delete:
      description: Delete a category by ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete category
      tags:
      - Categories
    get:
      description: Returns a single category by its database ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get category by ID
      tags:
      - Categories (Admin)
    put:
      consumes:
      - application/json
      description: Update an existing category by ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated category data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update category
      tags:
      - Categories
  /admin/categories/tree:
    get:
      description: Returns categories organized in a parent-child tree structure
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
            type: object
      security:
      - BearerAuth: []
      summary: List categories as tree
      tags:
      - Categories (Admin)
  /admin/comments:
    get:
      description: Returns paginated comments with optional status filtering
      parameters:
      - description: Status filter
        in: query
        name: status
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              comments:
                items:
                  type: object
                type: array
              total:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: List all comments (admin)
      tags:
      - Comments (Admin)
  /admin/comments/{id}:
    delete:
      description: Delete a comment by ID
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete comment
      tags:
      - Comments (Admin)
  /admin/comments/{id}/pin:
    put:
      consumes:
      - application/json
      description: Set or unset the pinned flag on a comment
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Pin state
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Pin comment
      tags:
      - Comments (Admin)
  /admin/comments/{id}/status:
    patch:
      consumes:
      - application/json
      description: Approve, reject, or mark a comment as spam
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status update
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update comment status
      tags:
      - Comments (Admin)
  /admin/comments/reply:
    post:
      responses: {}
      security:
      - BearerAuth: []
      summary: Reply as site author (admin)
      tags:
      - Comments (Admin)
  /admin/email-settings:
    get:
      description: Returns the email configuration with SMTP password masked
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Get email settings
      tags:
      - Email Settings (Admin)
    put:
      consumes:
      - application/json
      description: Update email SMTP/template configuration (immediate publish)
      parameters:
      - description: Email configuration
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: object
            type: object
      security:
      - BearerAuth: []
      summary: Update email settings
      tags:
      - Email Settings (Admin)
  /admin/email-settings/test:
    post:
      consumes:
      - application/json
      description: Sends a test email to verify SMTP configuration
      parameters:
      - description: Test email recipient
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: object
            type: object
      security:
      - BearerAuth: []
      summary: Send test email
      tags:
      - Email Settings (Admin)
  /admin/form-submissions:
    get:
      description: Returns paginated form submissions with optional filters
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Form type filter
        in: query
        name: formType
        type: string
      - description: Status filter (unread/read/archived)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
              page:
                type: integer
              pageSize:
                type: integer
              total:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: List form submissions (admin)
      tags:
      - Form Submissions (Admin)
  /admin/form-submissions/{id}:
    delete:
      description: Soft-delete a form submission by ID
      parameters:
      - description: Submission ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete form submission
      tags:
      - Form Submissions (Admin)
    get:
      description: Returns a single form submission
      parameters:
      - description: Submission ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get form submission by ID
      tags:
      - Form Submissions (Admin)
  /admin/form-submissions/{id}/status:
    patch:
      consumes:
      - application/json
      description: Update the status of a single form submission
      parameters:
      - description: Submission ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status update
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
